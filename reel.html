<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Reel</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    width: 390px;
    height: 844px;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
    position: relative;
  }

  /* BACKGROUND */
  .bg {
    position: absolute;
    inset: 0;
    background: #000;
    z-index: 0;
  }

  .bg-gradient {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 0%, rgba(255,180,0,0.15) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 100%, rgba(255,100,0,0.1) 0%, transparent 50%);
    z-index: 1;
  }

  /* PARTICLES */
  .particles {
    position: absolute;
    inset: 0;
    z-index: 2;
    overflow: hidden;
  }

  .particle {
    position: absolute;
    width: 2px;
    height: 2px;
    background: rgba(255,200,0,0.6);
